<!DOCTYPE html>
<html lang="en">
    <head>
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta http-equiv="pragma" content="no-cache"/>
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name ="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta charset="utf-8"/>
        <title>Project1</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }

            body {
                background: #000000;
                color: #cccccc;
                width: 100vw;
                height: 100vh;
                overflow: hidden;
            }

            #startScreen {
                position: fixed;
                top: 0; left: 0;
                width: 100vw;
                height: 100vh;
                background: #000;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                z-index: 9999;
                gap: 30px;
            }
            #startScreen h1 {
                color: #fff;
                font-family: Arial, sans-serif;
                font-size: 36px;
                letter-spacing: 4px;
            }
            #playBtn {
                background: transparent;
                color: #fff;
                border: 2px solid #fff;
                padding: 16px 60px;
                font-size: 22px;
                font-family: Arial, sans-serif;
                cursor: pointer;
                border-radius: 8px;
                letter-spacing: 3px;
                transition: all 0.2s;
            }
            #playBtn:hover { background: #fff; color: #000; }
            #loadingText {
                color: #888;
                font-family: Arial, sans-serif;
                font-size: 14px;
                display: none;
            }

            div.gm4html5_div_class {
                width: 100vw;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            canvas {
                image-rendering: optimizeSpeed;
                image-rendering: pixelated;
                -webkit-interpolation-mode: nearest-neighbor;
                -ms-touch-action: none;
                max-width: 100vw;
                max-height: 100vh;
                width: auto !important;
                height: auto !important;
            }

            :-webkit-full-screen #canvas { width: 100%; height: 100%; }
            :-webkit-full-screen { width: 100%; height: 100%; }

            div.gm4html5_login {
                padding: 20px;
                position: absolute;
                border: solid 2px #000000;
                background-color: #404040;
                color: #00ff00;
                border-radius: 15px;
                box-shadow: #101010 20px 20px 40px;
            }
            div.gm4html5_cancel_button { float: right; }
            div.gm4html5_login_button { float: left; }
            div.gm4html5_login_header { text-align: center; }
        </style>
    </head>
    <body>

        <div id="startScreen">
            <h1>Project 1</h1>
            <button id="playBtn" onclick="startGame()">&#9654; PLAY</button>
            <span id="loadingText">Loading...</span>
        </div>

        <div class="gm4html5_div_class" id="gm4html5_div_id">
            <canvas id="canvas" width="1920" height="1080">
               <p>Your browser doesn't support HTML5 canvas.</p>
            </canvas>
        </div>

        <script type="text/javascript" src="html5game/Project1.js?DYAYB=541800294"></script>
        <script>
            function startGame() {
                document.getElementById('playBtn').style.display = 'none';
                document.getElementById('loadingText').style.display = 'block';
                try {
                    var AC = window.AudioContext || window.webkitAudioContext;
                    if (AC) { var ac = new AC(); ac.resume(); }
                } catch(e) {}
                setTimeout(function() {
                    document.getElementById('startScreen').style.display = 'none';
                    GameMaker_Init();
                }, 300);
            }
        </script>

    </body>
</html>
